<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrir Configuración Android</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            padding:40px;
            background:#f5f5f5;
        }

        h1{
            color:#333;
        }

        .btn{
            display:block;
            width:280px;
            margin:15px auto;
            padding:15px;
            text-decoration:none;
            color:white;
            background:#007bff;
            border-radius:10px;
            font-size:18px;
        }

        .btn:hover{
            background:#0056b3;
        }

        .info{
            max-width:500px;
            margin:20px auto;
            color:#666;
        }
    </style>
</head>
<body>

    <h1>Configuración de Android</h1>

    <p class="info">
        Si los botones no funcionan, abre la aplicación Ajustes manualmente.
        Algunos navegadores bloquean los enlaces especiales.
    </p>

    <a class="btn"
       href="intent:#Intent;action=android.settings.SETTINGS;end">
        🔧 Abrir Configuración General
    </a>

    <a class="btn"
       href="intent:#Intent;action=android.settings.APPLICATION_SETTINGS;end">
        📱 Abrir Aplicaciones
    </a>

    <a class="btn"
       href="intent:#Intent;action=android.settings.WIFI_SETTINGS;end">
        📶 Abrir Wi-Fi
    </a>

    <a class="btn"
       href="intent:#Intent;action=android.settings.BLUETOOTH_SETTINGS;end">
        🔵 Abrir Bluetooth
    </a>

    <a class="btn"
       href="intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end">
        📍 Abrir Ubicación
    </a>

</body>
</html>
